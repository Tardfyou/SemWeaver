version: "2.2.0"
description: "SemWeaver configuration"

project:
  name: "SemWeaver"
  version: "2.2.0"
  description: "Patch-guided detector generation and evidence-based refinement"

mcp:
  enabled: false
  export_manifest_on_start: false
  manifest_path: "${PROJECT_ROOT:-.}/output/mcp_tools_manifest.json"

paths:
  root_dir: "${PROJECT_ROOT:-.}"
  prompts_dir: "${PROJECT_ROOT:-.}/prompts"
  output_dir: "${PROJECT_ROOT:-.}/output"
  logs_dir: "${PROJECT_ROOT:-.}/logs"
  tests_dir: "${PROJECT_ROOT:-.}/tests"

llm:
  # Supported providers: openai, deepseek, anthropic, openai_compatible.
  # Keys are read from OPENAI_API_KEY, DEEPSEEK_API_KEY, or ANTHROPIC_API_KEY.
  # For openai_compatible, also set OPENAI_BASE_URL or llm.base_urls.openai_compatible.
  provider: "${SEMWEEVER_LLM_PROVIDER:-openai}"
  primary_model: "${SEMWEEVER_MODEL:-gpt-4.1}"
  review_model: "${SEMWEEVER_REVIEW_MODEL:-gpt-4.1}"
  reasoning_effort: ""
  store: false
  api_keys: {}
  base_urls:
    openai_compatible: "${OPENAI_BASE_URL:-}"
  generation:
    temperature: 0.2
    max_tokens: 32768
    timeout: 120
    max_retries: 3
    stream: true
  generate:
    max_tokens: 65536
  refine:
    max_tokens: 65536

agent:
  max_iterations: 30
  verbose: true
  stream_output: true
  temperature: 0.2
  generate_temperature: 0.15
  generate_patch_analysis_temperature: 0.08
  generate_plan_temperature: 0.25
  generate_rag_check_temperature: 0.0
  generate_draft_temperature: 0.18
  generate_repair_temperature: 0.05
  refine_temperature: 0.1
  refine_decision_temperature: 0.08
  refine_repair_temperature: 0.04
  require_relevant_knowledge_before_generation: true
  required_knowledge_min_similarity: 0.7
  required_knowledge_min_results: 1
  required_knowledge_top_k: 2
  enable_analyzer_selection: true

patchweaver:
  enabled: true
  preflight_analysis: true
  generate_preflight_enabled: false
  max_planned_requirements: 8

quality_gates:
  artifact_review:
    enabled: true

refine:
  max_rounds: 3
  structural_candidate:
    enabled: false
    allowed_families:
      csa: []
      codeql: []

validation:
  semantic:
    timeout: 720
    csa_jobs: 8
    codeql_auto_create_db: true

compilation:
  llvm_dir: "${LLVM_DIR:-/usr/lib/llvm-18}"
  clang_path: "${CLANGXX:-/usr/lib/llvm-18/bin/clang++}"
  timeout_seconds: 120

codeql:
  enabled: true
  codeql_path: "${CODEQL:-codeql}"
  database_path: "${PROJECT_ROOT:-.}/codeql_dbs"
  validation_retries: 2
  search_path: "${PROJECT_ROOT:-.}/codeql_packs"
  timeout: 120
  max_memory_mb: 1024
  cache_enabled: true
  cache_dir: "${PROJECT_ROOT:-.}/codeql_cache"
  database:
    create_if_missing: true
    overwrite: false
    parallel_workers: 2

analyzer_selection:
  default_strategy: "smart"
  confidence_threshold: 0.7
  vulnerability_weights:
    memory_leak: 0.2
    buffer_overflow: 0.3
    use_after_free: 0.3
    integer_overflow: 0.2
    sql_injection: 0.4
    xss: 0.4
    command_injection: 0.4
    format_string: 0.2
    path_traversal: 0.2
    taint_tracking: 0.3
  csa:
    preferred_for_memory: true
    preferred_for_taint: false
    precision_weight: 0.7
    cross_file_weight: 0.3
  codeql_config:
    preferred_for_memory: false
    preferred_for_taint: true
    global_analysis_weight: 0.7
    cross_file_weight: 0.8

knowledge_base:
  chromadb:
    host: "${CHROMA_HOST:-localhost}"
    port: 8001
    collection: "checker_knowledge"
  embedding:
    model: "sentence-transformers--all-MiniLM-L6-v2"
    cache_dir: "${PROJECT_ROOT:-.}/pretrained_models"
  retrieval:
    top_k: 2
    similarity_threshold: 0.7
  codeql_knowledge:
    enabled: true
    collection: "codeql_knowledge"
    examples_file: "${PROJECT_ROOT:-.}/data/knowledge/codeql_examples.json"
    templates_file: "${PROJECT_ROOT:-.}/data/knowledge/codeql_templates.json"
